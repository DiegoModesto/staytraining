name: staytraining
description: StayTraining — app de treinos (Aluno). Musculação, funcional e boxe.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State management & navigation (manual providers — no codegen required)
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # HTTP
  dio: ^5.7.0

  # Local offline store (hand-written SQL — no codegen)
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4

  # Auth token storage
  flutter_secure_storage: ^9.2.2
  flutter_appauth: ^7.0.1

  # Media
  cached_network_image: ^3.4.1
  youtube_player_flutter: ^9.1.1
  video_player: ^2.9.2
  image_picker: ^1.1.2
  image_cropper: ^8.0.2

  # Local notifications (offline pending reminders). FCM push is optional — see README.
  flutter_local_notifications: ^17.2.4

  intl: ^0.19.0

  # Design system "VOLT" fonts (Archivo display + Hanken Grotesk body)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
